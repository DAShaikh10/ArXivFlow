repos:
  # General repository hygiene.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml # Validates YAML syntax
      - id: check-added-large-files # Prevents accidentally committing giant files
      - id: check-merge-conflict # Checks for unresolved merge conflicts
      - id: detect-private-key # Detects if you accidentally commit a private key (e.g. AWS, RSA)
      - id: end-of-file-fixer # Ensures files end with a newline
      - id: trailing-whitespace # Trims trailing whitespace

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.25.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]
