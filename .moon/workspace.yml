# Configures all projects within the workspace to create a project graph.
# Accepts a list of globs, a mapping of projects to relative file paths,
# or both values.
projects:
  annotate: "packages/annotate"
  "api": "apps/api"
  client: "apps/client"
  compass: "packages/compass"
  crucible: "packages/crucible"
  lsml: "packages/lsml"
  papervec: "packages/papervec"

codeowners:
  globalPaths:
    "*": ["@DAShaikh10"]
  sync: true # Auto-generate CODEOWNERS file with the above configuration.

docker:
  scaffold:
    configsPhaseGlobs:
      - ".moon/workspace.yml"

# Experimental features that improve performance.
experiments:
  asyncAffectedTracking: true
  asyncGraphBuilding: true

telemetry: false

# Configures the version control system (VCS). Also known as
# source code management (SCM).
vcs:
  # The default branch / base.
  defaultBranch: "main"

  hooks:
    # Use root-level uv with 'x' to auto-download and setup.
    pre-commit:
      - "uvx pre-commit run"
      - "moon run :lint :format --affected --status=staged"
    commit-msg:
      - "uvx pre-commit run --hook-stage commit-msg --commit-msg-filename $ARG1"

  # The upstream version control provider, where the repository
  # source code is stored.
  # @since 1.8.0
  # @values "bitbucket" | "github" | "gitlab" | "other"
  provider: "github"
  sync: true # Auto-configure hooks.
