layer: application
language: python

project:
  name: lsml
  description: Label Studio ML Backend application.
  maintainers: ["@DAShaikh10"]

stack: "backend"
tags:
  - data-annotation
  - gliner
  - label-studio
  - label-studio-ml-backend
  - named-entity-recognition
  - python
  - uv

# Each dependency is listed explicitly.
dependsOn:
  - annotate
  - crucible

docker:
  file:
    # moon requires bash, curl and uv requires python and hence this is the minimal image for build stages.
    image: python:3.14-slim
    template: "packages/lsml/Dockerfile.tera"
  scaffold:
    configsPhaseGlobs:
      - "pyproject.toml"
      - "uv.lock"
    sourcesPhaseGlobs:
      - "src/**/*"

tasks:
  clean:
    command: bash
    args:
      - scripts/clean.sh
    description: Clean virtualenvs, Python cache, and uv lockfiles.

  dockerize:
    command: docker build
    args:
      - --platform
      - linux/amd64
      - -t
      - dashaikh10/arxivflow-lsml:latest
      - -f
      - packages/lsml/Dockerfile
      - .
    description: Build the ArXivFlow Label Studio ML Backend Docker image. Use with `-- --no-cache` for a fresh build.
    options:
      # Docker command needs to be executed from the workspace per moon's requirements.
      runFromWorkspaceRoot: true

  format:
    command: black .
    description: Format code using Black.

  format-check:
    command: black --check .
    description: Check code formatting using Black.

  gliner:
    command: uc run -m uvicorn src.lib.models.server:app --host 0.0.0.0 --port 9090 --workers 1
    description: Run the Gliner NER model server using Uvicorn.

  lint:
    command: pylint .
    description: Lint code using Pylint.

  publish:
    command: docker push dashaikh10/arxivflow-lsml:latest
    description: Publish the ArXivFlow Label Studio ML Backend Docker image to DockerHub.
    deps:
      - dockerize

  sync:
    command: uv sync
    description: Sync (create .venv, install missing dependencies) the project environment (generate / with the lockfile).
