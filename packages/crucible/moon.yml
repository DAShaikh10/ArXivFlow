layer: tool
language: python

project:
  name: crucible
  description: Research paper scraper and raw data quality check package.
  maintainers: ["@DAShaikh10"]

stack: "data"
tags:
  - arxiv
  - data-scraping
  - data-quality
  - python
  - semantic-scholar
  - uv

docker:
  file:
    # moon requires bash, curl and uv requires python and hence this is the minimal image for build stages.
    image: python:3.14-alpine
    template: "packages/crucible/Dockerfile.tera"
  scaffold:
    configsPhaseGlobs:
      - "pyproject.toml"
      - "uv.lock"
    sourcesPhaseGlobs:
      - "src/**/*"
      - "!src/lib/quality/*"

tasks:
  arxiv:
    command: uv run -m src.lib.arxiv.main
    description: Scrape research papers from ArXiv API.

  clean:
    command: bash
    args:
      - scripts/clean.sh
    description: Clean virtualenvs, Python cache, and uv lockfiles.

  quality:
    command: uv run -m streamlit run src/lib/quality/pre_main.py
    description: Open the pre-annotation Quality Check Streamlit dashboard.

  dockerize:
    command: docker build --platform linux/amd64 -t dashaikh10/arxivflow-crucible:latest -f packages/crucible/Dockerfile --no-cache .
    description: Build the ArXivFlow Crucible Docker image.
    options:
      # Docker command needs to be executed from the workspace per moon's requirements.
      runFromWorkspaceRoot: true

  format:
    command: black .
    description: Format code using Black.

  format-check:
    command: black --check .
    description: Check code formatting using Black.

  lint:
    command: pylint .
    description: Lint code using Pylint.

  publish:
    command: docker push dashaikh10/arxivflow-crucible:latest
    description: Publish the ArXivFlow Crucible Docker image to DockerHub.
    deps:
      - dockerize

  s2:
    command: uv run -m src.lib.s2.main
    description: Enrich scraped research papers with data from Semantic Scholar API.

  sync:
    command: uv sync
    description: Sync (create .venv, install missing dependencies) the project environment (generate / with the lockfile).
