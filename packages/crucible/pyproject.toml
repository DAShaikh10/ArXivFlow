[project]
name = "crucible"
version = "1.0.0"
description = "Research paper scraper and raw data quality check package"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "aiofiles>=25.1.0",
    "aiohttp>=3.13.5",
    "aiolimiter>=1.2.1",
    "python-dotenv>=1.2.2",
    "tenacity>=9.1.4",
    "tqdm>=4.67.3",
    "wandb>=0.27.0",
]

# Streamlit is actually a main dependency for the lib/quality module.
# But we want to avoid installing it in the Docker image to keep it lightweight.
# Hence as a workaround, we will install it as a dev dependency.
# moon is configured to use `uv sync` command (See ArXivFlow/.moon/toolchains.yml)
# and that is what `moon docker setup` uses to install dependencies in the Docker image.

[dependency-groups]
dev = [
    "black>=26.3.1",
    "pylint>=4.0.5",
    "ruff",
    "streamlit>=1.57.0",
]

[tool.black]
line-length = 120

[tool.pylint.main]
ignore = [
    ".venv",
    "__pycache__"
]

[tool.pylint.format]
max-line-length = 120

[tool.ruff]
line-length = 120
target-version = "py314" # Keeps Ruff aligned with your project requirements

[tool.ruff.lint]
extend-select = ["I"] # Adds isort rules (I) to the default set (E, F)
