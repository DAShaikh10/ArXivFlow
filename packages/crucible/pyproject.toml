[project]
name = "crucible"
version = "1.0.0"
description = "Research paper scraper package"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "aiofiles>=25.1.0",
    "aiohttp>=3.13.5",
    "python-dotenv>=1.2.2",
    "streamlit>=1.57.0",
    "tenacity>=9.1.4",
    "tqdm>=4.67.3",
]

[dependency-groups]
dev = [
    "black>=26.3.1",
    "pylint>=4.0.5",
    "ruff",
]

[tool.black]
line-length = 120

[tool.pylint.main]
ignore = [
    ".venv",
    "__pycache__"
]

[tool.pylint.format]
max-line-length = 120

[tool.ruff]
line-length = 120
target-version = "py314" # Keeps Ruff aligned with your project requirements

[tool.ruff.lint]
extend-select = ["I"] # Adds isort rules (I) to the default set (E, F)
