[project]
name = "compass"
version = "1.0.0"
description = "Research paper recommendation & evaluation package"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "chromadb",
    "numpy",
    "python-dotenv",
    "rank-bm25",
    "scipy",
    "sentence-transformers",
]

[dependency-groups]
dev = [
    "black",
    "pylint",
    "ruff",
]
# The corpus-relatedness Streamlit app (src/lib/relatedness). Kept out of the core deps so the eval
# harness stays lean. Run: `uv run --group app streamlit run src/lib/relatedness/app.py`.
app = [
    "pandas",
    "streamlit",
]
# Real free-text query perturbation (src/lib/recommend/embed.py) re-embeds typo'd/paraphrased queries
# through the SPECTER2 adhoc-query adapter, which needs adapter-transformers. The model-free perturbation
# harness (Gaussian noise / token dropout) does not, so this stays optional and out of the lean default.
# Run: `uv run --group perturb-text -m src.lib.recommend.perturb` with PERTURB_TEXT=1.
perturb-text = [
    "adapters",
]

[tool.black]
line-length = 120
target-version = ["py314"]

[tool.pylint.main]
ignore = [
    ".venv",
    "__pycache__"
]
# pandas/streamlit live in the optional `app` group, so they are absent from the lean default env
# pylint runs against. Treat them as unresolvable rather than flagging import-error.
ignored-modules = ["pandas", "streamlit"]

[tool.pylint.messages_control]
# duplicate-code is a whole-module check that inline disables cannot scope: the two hits here are a
# four-line JSONL reader and the report-writing tail, trivial idioms not worth a shared abstraction.
disable = ["duplicate-code"]

[tool.pylint.format]
max-line-length = 120

[tool.ruff]
line-length = 120
target-version = "py314"

[tool.ruff.lint]
extend-select = ["I"]

[tool.ruff.lint.per-file-ignores]
# The Streamlit app must insert the compass root onto sys.path before its package imports (see the
# comment there), so E402 is unavoidable — this mirrors the file-level pylint wrong-import-position disable.
"src/lib/relatedness/app.py" = ["E402"]
