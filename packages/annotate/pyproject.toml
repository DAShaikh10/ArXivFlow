[project]
name = "annotate"
version = "1.0.0"
description = "Research paper annotation tools"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "aiofiles",
    "codecarbon",
    "dotenv",
    "gliner",
    "tqdm",
    "wandb",
]

# sckit-learn and krippendorff are only needed for calculating inter-annotator agreement by the quality library.
[dependency-groups]
dev = [
    "black",
    "krippendorff",
    "pylint",
    "ruff",
    "scikit-learn",
]

[project.optional-dependencies]
llm = ["vllm"]

[tool.black]
line-length = 120
target-version = ["py314"]

[tool.pylint.main]
ignore = [
    ".venv",
    "__pycache__"
]
ignored-modules = ["vllm"]

[tool.pylint.format]
max-line-length = 120

[tool.ruff]
line-length = 120
target-version = "py314" # Keeps Ruff aligned with your project requirements

[tool.ruff.lint]
extend-select = ["I"] # Adds isort rules (I) to the default set (E, F)
