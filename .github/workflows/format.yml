name: Format

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v261c62cb5b0f580c7be7c8cd0f023a2e96756095 # 0.6.4
        with:
          auto-install: true
      - name: Run format check
        run: moon run :format-check --affected
